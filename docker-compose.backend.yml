services:
  concord-db:
    image: postgres:16-alpine
    container_name: concord-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-concord}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-concord}
      POSTGRES_DB: ${POSTGRES_DB:-concord}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - concord_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-concord} -d ${POSTGRES_DB:-concord}']
      interval: 5s
      timeout: 5s
      retries: 20

  concord-api:
    build:
      context: ./backend
    container_name: concord-api
    restart: unless-stopped
    depends_on:
      concord-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-concord}:${POSTGRES_PASSWORD:-concord}@concord-db:5432/${POSTGRES_DB:-concord}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
      API_PREFIX: /v1
      APP_NAME: Concord API
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-30}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-30}
      MESSAGE_RETENTION_DAYS: ${MESSAGE_RETENTION_DAYS:-365}
      UPLOAD_RETENTION_DAYS: ${UPLOAD_RETENTION_DAYS:-7}
      RETENTION_SWEEP_MINUTES: ${RETENTION_SWEEP_MINUTES:-60}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-concord-images}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_PRESIGN_EXPIRY_SECONDS: ${S3_PRESIGN_EXPIRY_SECONDS:-900}
      S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE:-true}
      S3_PREFIX: ${S3_PREFIX:-images}
      UPLOAD_ALLOWED_CONTENT_TYPES: ${UPLOAD_ALLOWED_CONTENT_TYPES:-image/jpeg,image/png,image/webp,image/gif}
    ports:
      - '${API_PORT:-8000}:8000'
    volumes:
      - concord_upload_data:/data/uploads
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          'import urllib.request; urllib.request.urlopen("http://localhost:8000/healthz")',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  concord-worker:
    build:
      context: ./backend
    container_name: concord-worker
    restart: unless-stopped
    depends_on:
      concord-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-concord}:${POSTGRES_PASSWORD:-concord}@concord-db:5432/${POSTGRES_DB:-concord}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-30}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-30}
      MESSAGE_RETENTION_DAYS: ${MESSAGE_RETENTION_DAYS:-365}
      UPLOAD_RETENTION_DAYS: ${UPLOAD_RETENTION_DAYS:-7}
      RETENTION_SWEEP_MINUTES: ${RETENTION_SWEEP_MINUTES:-60}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-concord-images}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_PRESIGN_EXPIRY_SECONDS: ${S3_PRESIGN_EXPIRY_SECONDS:-900}
      S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE:-true}
      S3_PREFIX: ${S3_PREFIX:-images}
      UPLOAD_ALLOWED_CONTENT_TYPES: ${UPLOAD_ALLOWED_CONTENT_TYPES:-image/jpeg,image/png,image/webp,image/gif}
    volumes:
      - concord_upload_data:/data/uploads
    command: ['python', '-m', 'app.worker']

volumes:
  concord_postgres_data:
  concord_upload_data:
